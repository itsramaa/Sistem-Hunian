<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="280" height="80" role="img" aria-label="SiHuni Logo">
  <defs>
    <linearGradient id="houseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- House icon -->
  <!-- Roof -->
  <polygon points="40,12 72,36 8,36" fill="url(#houseGrad)" />
  <!-- Roof ridge cap -->
  <rect x="36" y="10" width="8" height="6" rx="2" fill="url(#houseGrad)" />
  <!-- Wall -->
  <rect x="14" y="36" width="52" height="30" rx="3" fill="url(#houseGrad)" />
  <!-- Door -->
  <rect x="33" y="48" width="14" height="18" rx="3" fill="white" opacity="0.95" />
  <!-- Door knob -->
  <circle cx="44" cy="57" r="1.5" fill="url(#houseGrad)" />
  <!-- Left window -->
  <rect x="18" y="42" width="11" height="10" rx="2" fill="white" opacity="0.85" />
  <!-- Right window -->
  <rect x="51" y="42" width="11" height="10" rx="2" fill="white" opacity="0.85" />
  <!-- Chimney -->
  <rect x="55" y="20" width="7" height="14" rx="1" fill="url(#houseGrad)" />

  <!-- SiHuni text -->
  <text
    x="88"
    y="52"
    font-family="'Segoe UI', 'Inter', Arial, sans-serif"
    font-size="34"
    font-weight="700"
    letter-spacing="-0.5"
    fill="url(#textGrad)"
  >SiHuni</text>

  <!-- Tagline -->
  <text
    x="89"
    y="67"
    font-family="'Segoe UI', 'Inter', Arial, sans-serif"
    font-size="10"
    font-weight="400"
    letter-spacing="1.5"
    fill="#6b7280"
  >MANAJEMEN PROPERTI</text>
</svg>
