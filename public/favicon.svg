<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="SiHuni Icon">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#iconGrad)" />

  <!-- House: Roof -->
  <polygon points="32,10 56,30 8,30" fill="white" opacity="0.95" />
  <!-- Roof ridge cap -->
  <rect x="28" y="8" width="8" height="5" rx="2" fill="white" opacity="0.95" />
  <!-- House: Wall -->
  <rect x="12" y="30" width="40" height="26" rx="3" fill="white" opacity="0.9" />
  <!-- Door -->
  <rect x="26" y="40" width="12" height="16" rx="2" fill="url(#iconGrad)" />
  <!-- Door knob -->
  <circle cx="35" cy="48" r="1.5" fill="white" />
  <!-- Left window -->
  <rect x="15" y="34" width="9" height="8" rx="2" fill="url(#iconGrad)" opacity="0.8" />
  <!-- Right window -->
  <rect x="40" y="34" width="9" height="8" rx="2" fill="url(#iconGrad)" opacity="0.8" />
  <!-- Chimney -->
  <rect x="43" y="17" width="6" height="12" rx="1" fill="white" opacity="0.9" />
</svg>
