openapi: 3.0.3
info:
  title: Sihuni API
  version: 1.0.0
  description: Sistem Hunian — Property Management API

servers:
  - url: http://localhost:9090
    description: Local dev

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        data:
          nullable: true
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
            status: { type: integer }

    AuthTokens:
      type: object
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        user:
          type: object
          properties:
            id: { type: string, format: uuid }
            email: { type: string }
            role: { type: string, enum: [admin, merchant, tenant, vendor] }
            full_name: { type: string }

    Property:
      type: object
      properties:
        id: { type: string, format: uuid }
        merchant_id: { type: string, format: uuid }
        name: { type: string }
        address: { type: string }
        city: { type: string }
        province: { type: string }
        type: { type: string, enum: [kos, apartment, ruko, villa] }
        description: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Unit:
      type: object
      properties:
        id: { type: string, format: uuid }
        property_id: { type: string, format: uuid }
        merchant_id: { type: string, format: uuid }
        name: { type: string }
        floor: { type: string }
        type: { type: string }
        status: { type: string, enum: [available, occupied, maintenance] }
        rent_amount: { type: number }
        description: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Invoice:
      type: object
      properties:
        id: { type: string, format: uuid }
        merchant_id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        amount: { type: number }
        status: { type: string, enum: [draft, sent, paid, overdue, cancelled] }
        due_date: { type: string, format: date }
        created_at: { type: string, format: date-time }

    Contract:
      type: object
      properties:
        id: { type: string, format: uuid }
        merchant_id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        unit_id: { type: string, format: uuid }
        status: { type: string }
        start_date: { type: string, format: date }
        end_date: { type: string, format: date }
        rent_amount: { type: number }
        deposit_amount: { type: number }
        created_at: { type: string, format: date-time }

    Notification:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        title: { type: string }
        body: { type: string }
        type: { type: string }
        read: { type: boolean }
        created_at: { type: string, format: date-time }

    Subscription:
      type: object
      properties:
        id: { type: string, format: uuid }
        merchant_id: { type: string, format: uuid }
        tier_id: { type: string, format: uuid }
        status: { type: string }
        started_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time }

    Referral:
      type: object
      properties:
        id: { type: string, format: uuid }
        referrer_id: { type: string, format: uuid }
        referee_id: { type: string, format: uuid }
        code: { type: string }
        status: { type: string }
        commission_amount: { type: number }
        created_at: { type: string, format: date-time }

    Waitinglist:
      type: object
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        property_id: { type: string, format: uuid }
        unit_id: { type: string, format: uuid, nullable: true }
        notes: { type: string }
        status: { type: string, enum: [waiting, notified, cancelled] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ListWaitinglistResponse:
      type: object
      properties:
        total: { type: integer }
        items:
          type: array
          items:
            $ref: '#/components/schemas/Waitinglist'

security:
  - bearerAuth: []

paths:
  /health:
    get:
      tags: [System]
      summary: Health check
      security: []
      responses:
        '200':
          description: OK

  # ── Auth ──────────────────────────────────────────────────────────────────
  /v1/auth/register:
    post:
      tags: [Auth]
      summary: Register new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, role]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
                role: { type: string, enum: [merchant, tenant, vendor] }
                full_name: { type: string }
                phone_number: { type: string }
      responses:
        '201':
          description: Registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/AuthTokens' }

  /v1/auth/login:
    post:
      tags: [Auth]
      summary: Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/AuthTokens' }

  /v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string }
      responses:
        '200':
          description: New access token
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      access_token: { type: string }

  /v1/auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      responses:
        '200':
          description: Current user

  /v1/auth/bootstrap:
    post:
      tags: [Auth]
      summary: Bootstrap user profile after registration
      responses:
        '200':
          description: Bootstrapped

  # ── Invitations ───────────────────────────────────────────────────────────
  /v1/invitations/{token}:
    get:
      tags: [Invitations]
      summary: Get invitation by token
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Invitation details

  /v1/invitations/accept:
    post:
      tags: [Invitations]
      summary: Accept invitation
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: { type: string }
      responses:
        '200':
          description: Accepted

  # ── Properties ────────────────────────────────────────────────────────────
  /v1/properties:
    get:
      tags: [Properties]
      summary: List properties
      responses:
        '200':
          description: List of properties
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Property' }
    post:
      tags: [Properties]
      summary: Create property
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                address: { type: string }
                city: { type: string }
                province: { type: string }
                type: { type: string }
                description: { type: string }
      responses:
        '201':
          description: Created

  /v1/properties/{id}:
    get:
      tags: [Properties]
      summary: Get property
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Property detail
    put:
      tags: [Properties]
      summary: Update property
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Property' }
      responses:
        '200':
          description: Updated
    delete:
      tags: [Properties]
      summary: Delete property
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Deleted

  /v1/properties/{id}/units:
    get:
      tags: [Units]
      summary: List units for property
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Units list
    post:
      tags: [Units]
      summary: Create unit
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                floor: { type: string }
                type: { type: string }
                rent_amount: { type: number }
                description: { type: string }
      responses:
        '201':
          description: Created

  /v1/units/{id}:
    get:
      tags: [Units]
      summary: Get unit
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Unit detail
    put:
      tags: [Units]
      summary: Update unit
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Unit' }
      responses:
        '200':
          description: Updated
    delete:
      tags: [Units]
      summary: Delete unit
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Deleted

  # ── Contracts ─────────────────────────────────────────────────────────────
  /v1/contracts:
    get:
      tags: [Contracts]
      summary: List contracts
      responses:
        '200':
          description: Contracts list

  /v1/contracts/{id}:
    get:
      tags: [Contracts]
      summary: Get contract
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Contract detail

  /v1/contracts/{id}/deposit-refund:
    post:
      tags: [Contracts]
      summary: Process deposit refund
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Processed

  /v1/contracts/move-outs:
    get:
      tags: [Contracts]
      summary: List move-outs
      responses:
        '200':
          description: Move-outs list

  /v1/contracts/move-outs/{id}:
    get:
      tags: [Contracts]
      summary: Get move-out
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Move-out detail

  /v1/contracts/move-outs/{id}/status:
    put:
      tags: [Contracts]
      summary: Update move-out status
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Updated

  # ── Billing ───────────────────────────────────────────────────────────────
  /v1/billing/invoices:
    get:
      tags: [Billing]
      summary: List invoices
      responses:
        '200':
          description: Invoices list
    post:
      tags: [Billing]
      summary: Create invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tenant_id: { type: string, format: uuid }
                amount: { type: number }
                due_date: { type: string, format: date }
      responses:
        '201':
          description: Created

  /v1/billing/invoices/{id}:
    get:
      tags: [Billing]
      summary: Get invoice
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Invoice detail

  /v1/billing/invoices/{id}/pdf:
    get:
      tags: [Billing]
      summary: Get invoice PDF
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: PDF file

  /v1/billing/invoices/{id}/status:
    put:
      tags: [Billing]
      summary: Update invoice status
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Updated

  # ── Payments ──────────────────────────────────────────────────────────────
  /v1/payments/xendit/invoice:
    post:
      tags: [Payments]
      summary: Create Xendit payment invoice
      responses:
        '201':
          description: Created

  /v1/payments/xendit/disbursement:
    post:
      tags: [Payments]
      summary: Create Xendit disbursement (merchant/admin only)
      responses:
        '201':
          description: Created

  # ── Notifications ─────────────────────────────────────────────────────────
  /v1/notifications:
    get:
      tags: [Notifications]
      summary: List notifications
      responses:
        '200':
          description: Notifications list
    post:
      tags: [Notifications]
      summary: Send notification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id: { type: string, format: uuid }
                title: { type: string }
                body: { type: string }
                type: { type: string }
      responses:
        '201':
          description: Sent

  /v1/notifications/{id}/read:
    put:
      tags: [Notifications]
      summary: Mark notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Marked as read

  # ── Subscriptions ─────────────────────────────────────────────────────────
  /v1/subscriptions/tiers:
    get:
      tags: [Subscriptions]
      summary: List subscription tiers
      responses:
        '200':
          description: Tiers list

  /v1/subscriptions:
    get:
      tags: [Subscriptions]
      summary: List subscriptions (merchant/admin)
      responses:
        '200':
          description: Subscriptions list
    post:
      tags: [Subscriptions]
      summary: Create subscription
      responses:
        '201':
          description: Created

  /v1/subscriptions/{id}:
    get:
      tags: [Subscriptions]
      summary: Get subscription
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Subscription detail

  /v1/subscriptions/{id}/status:
    put:
      tags: [Subscriptions]
      summary: Update subscription status
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Updated

  /v1/subscriptions/{id}/pay:
    post:
      tags: [Subscriptions]
      summary: Process subscription payment
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Processed

  # ── Referrals ─────────────────────────────────────────────────────────────
  /v1/referrals:
    get:
      tags: [Referrals]
      summary: List referrals
      responses:
        '200':
          description: Referrals list
    post:
      tags: [Referrals]
      summary: Create referral
      responses:
        '201':
          description: Created

  /v1/referrals/stats:
    get:
      tags: [Referrals]
      summary: Get referral stats
      responses:
        '200':
          description: Stats

  /v1/referrals/{id}:
    get:
      tags: [Referrals]
      summary: Get referral
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Referral detail

  # ── Waitinglist ──────────────────────────────────────────────────────────────
  /v1/waitinglist:
    post:
      tags: [Waitinglist]
      summary: Add to waiting list
      description: Adds the authenticated tenant to a property waiting list.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [property_id]
              properties:
                tenant_id: { type: string, format: uuid, description: Defaults to authenticated user ID }
                property_id: { type: string, format: uuid }
                unit_id: { type: string, format: uuid, nullable: true }
                notes: { type: string }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Waitinglist'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Already on waiting list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      tags: [Waitinglist]
      summary: List waiting list entries
      description: Returns all waiting list entries. Optionally filter by property_id.
      security:
        - bearerAuth: []
      parameters:
        - name: property_id
          in: query
          required: false
          schema: { type: string, format: uuid }
          description: Filter by property ID
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListWaitinglistResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/waitinglist/{id}:
    delete:
      tags: [Waitinglist]
      summary: Remove from waiting list
      description: Deletes a waiting list entry by ID.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Webhooks ──────────────────────────────────────────────────────────────
  /v1/webhooks/xendit:
    post:
      tags: [Webhooks]
      summary: Xendit payment webhook
      security: []
      responses:
        '200':
          description: OK

  /v1/webhooks/xendit/disbursement:
    post:
      tags: [Webhooks]
      summary: Xendit disbursement webhook
      security: []
      responses:
        '200':
          description: OK
