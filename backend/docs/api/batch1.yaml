openapi: "3.0.3"
info:
  title: Sistem Hunian Backend API
  description: REST API for Sistem Hunian property management platform
  version: "1.0.0"
  contact:
    name: Holycan
    url: https://github.com/itsramaa/Sistem-Hunian

servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://api.sihuni.id
    description: Production

tags:
  - name: health
    description: Health check
  - name: auth
    description: Authentication webhooks
  - name: notifications
    description: Email notifications
  - name: cron
    description: Scheduled job endpoints
  - name: properties
    description: Property management
  - name: units
    description: Unit management

paths:
  /health:
    get:
      tags: [health]
      summary: Health check
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /v1/auth/webhook:
    post:
      tags: [auth]
      summary: Auth webhook — upsert profile and role-specific records
      description: Called by Supabase after signup/login. Protected by X-Webhook-Secret header.
      security:
        - WebhookSecret: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthWebhookRequest"
      responses:
        "200":
          description: Webhook processed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthWebhookResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/notifications/send:
    post:
      tags: [notifications]
      summary: Send a notification email
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendNotificationRequest"
      responses:
        "200":
          description: Email sent successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendNotificationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/cron/payment-reminders:
    post:
      tags: [cron]
      summary: Send payment reminder emails for overdue invoices
      description: Queries invoices due within 7 days and sends reminder emails. Protected by X-Cron-Secret header.
      security:
        - CronSecret: []
      responses:
        "200":
          description: Reminders sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentReminderResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/properties:
    get:
      tags: [properties]
      summary: List all properties for the authenticated merchant
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of properties
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Property"
                  error:
                    type: "null"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [properties]
      summary: Create a new property
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePropertyRequest"
      responses:
        "201":
          description: Property created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Property"
                  error:
                    type: "null"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /v1/properties/{id}:
    get:
      tags: [properties]
      summary: Get a property by ID
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IDParam"
      responses:
        "200":
          description: Property details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Property"
                  error:
                    type: "null"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [properties]
      summary: Update a property
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IDParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePropertyRequest"
      responses:
        "200":
          description: Property updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Property"
                  error:
                    type: "null"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [properties]
      summary: Delete a property
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IDParam"
      responses:
        "204":
          description: Property deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/properties/{id}/units:
    get:
      tags: [units]
      summary: List all units for a property
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IDParam"
      responses:
        "200":
          description: List of units
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Unit"
                  error:
                    type: "null"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [units]
      summary: Create a new unit for a property
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IDParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUnitRequest"
      responses:
        "201":
          description: Unit created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Unit"
                  error:
                    type: "null"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/units/{id}:
    get:
      tags: [units]
      summary: Get a unit by ID
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IDParam"
      responses:
        "200":
          description: Unit details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Unit"
                  error:
                    type: "null"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [units]
      summary: Update a unit
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IDParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUnitRequest"
      responses:
        "200":
          description: Unit updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Unit"
                  error:
                    type: "null"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [units]
      summary: Delete a unit
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IDParam"
      responses:
        "204":
          description: Unit deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    CronSecret:
      type: apiKey
      in: header
      name: X-Cron-Secret
    WebhookSecret:
      type: apiKey
      in: header
      name: X-Webhook-Secret

  parameters:
    IDParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"

  schemas:
    ErrorEnvelope:
      type: object
      properties:
        data:
          nullable: true
        error:
          type: object
          properties:
            code:
              type: string
              example: BAD_REQUEST
            message:
              type: string
              example: name is required
            status:
              type: integer
              example: 400

    HealthResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            status:
              type: string
              example: ok
            service:
              type: string
              example: sistem-hunian-backend
        error:
          nullable: true

    AuthWebhookRequest:
      type: object
      required: [user_id, email]
      properties:
        user_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        full_name:
          type: string
        phone:
          type: string
        role:
          type: string
          enum: [merchant, tenant, vendor]
          default: tenant
        business_name:
          type: string
        merchant_code:
          type: string
        referral_code:
          type: string

    AuthWebhookResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            ok:
              type: boolean
        error:
          nullable: true

    SendNotificationRequest:
      type: object
      required: [type, recipient_email, recipient_name]
      properties:
        type:
          type: string
          enum: [invoice, payment_reminder, maintenance_update, general]
        recipient_email:
          type: string
          format: email
        recipient_name:
          type: string
        data:
          type: object
          additionalProperties: true

    SendNotificationResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            id:
              type: string
              description: Resend email ID
        error:
          nullable: true

    PaymentReminderResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            sent:
              type: integer
              description: Number of reminder emails sent
        error:
          nullable: true

    Property:
      type: object
      properties:
        id:
          type: string
          format: uuid
        merchant_id:
          type: string
          format: uuid
        name:
          type: string
        property_type:
          type: string
          example: kost
        address_id:
          type: string
          format: uuid
          nullable: true
        address:
          type: string
        city:
          type: string
        province:
          type: string
        postal_code:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, inactive, maintenance]
        total_units:
          type: integer
        occupied_units:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreatePropertyRequest:
      type: object
      required: [name, property_type]
      properties:
        name:
          type: string
        property_type:
          type: string
          example: kost
        address:
          type: string
        city:
          type: string
        province:
          type: string
        postal_code:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [active, inactive, maintenance]
          default: active

    UpdatePropertyRequest:
      type: object
      properties:
        name:
          type: string
        property_type:
          type: string
        address:
          type: string
        city:
          type: string
        province:
          type: string
        postal_code:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [active, inactive, maintenance]

    Unit:
      type: object
      properties:
        id:
          type: string
          format: uuid
        property_id:
          type: string
          format: uuid
        unit_number:
          type: string
        unit_type:
          type: string
        floor:
          type: integer
          nullable: true
        size_sqm:
          type: number
          nullable: true
        rent_amount:
          type: number
        deposit_amount:
          type: number
          nullable: true
        status:
          type: string
          enum: [available, occupied, maintenance, reserved]
        description:
          type: string
          nullable: true
        occupancy_type:
          type: string
          nullable: true
        electricity_included:
          type: boolean
        water_included:
          type: boolean
        wifi_included:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateUnitRequest:
      type: object
      required: [unit_number, rent_amount]
      properties:
        unit_number:
          type: string
        unit_type:
          type: string
        floor:
          type: integer
        size_sqm:
          type: number
        rent_amount:
          type: number
        deposit_amount:
          type: number
        status:
          type: string
          enum: [available, occupied, maintenance, reserved]
          default: available
        description:
          type: string
        occupancy_type:
          type: string
        electricity_included:
          type: boolean
          default: false
        water_included:
          type: boolean
          default: false
        wifi_included:
          type: boolean
          default: false

    UpdateUnitRequest:
      type: object
      properties:
        unit_number:
          type: string
        unit_type:
          type: string
        floor:
          type: integer
        size_sqm:
          type: number
        rent_amount:
          type: number
        deposit_amount:
          type: number
        status:
          type: string
          enum: [available, occupied, maintenance, reserved]
        description:
          type: string
        occupancy_type:
          type: string
        electricity_included:
          type: boolean
        water_included:
          type: boolean
        wifi_included:
          type: boolean
