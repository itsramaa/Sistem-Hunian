  <!-- Structured Data: Organization -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "SiHuni",
      "url": "https://sihuni.app",
      "logo": {
        "@type": "ImageObject",
        "url": "https://sihuni.app/logo.svg",
        "width": 280,
        "height": 80
      },
      "description": "SiHuni adalah platform manajemen properti terlengkap di Indonesia untuk kos, kontrakan, dan apartemen.",
      "foundingDate": "2024",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "ID",
        "addressRegion": "Jawa Barat"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "availableLanguage": "Indonesian"
      }
    }
    </script>

  <!-- Structured Data: SoftwareApplication -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "SiHuni",
      "applicationCategory": "BusinessApplication",
      "applicationSubCategory": "Property Management",
      "operatingSystem": "Web",
      "url": "https://sihuni.app",
      "description": "Platform manajemen properti terintegrasi untuk pemilik kos, kontrakan, dan apartemen di Indonesia. Kelola properti, penghuni, pembayaran, dan maintenance dalam satu sistem.",
      "inLanguage": "id-ID",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "IDR",
        "description": "Gratis untuk properti pertama"
      },
      "featureList": [
        "Manajemen Multi-Properti",
        "Manajemen Penghuni",
        "Pencatatan Pembayaran Sewa",
        "Konfirmasi Down Payment",
        "Manajemen Maintenance",
        "Dashboard Status Kamar",
        "Notifikasi Jatuh Tempo",
        "Kontrol Akses Berbasis Role (RBAC)",
        "Audit Trail"
      ],
      "screenshot": "https://sihuni.app/og-image.png",
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "reviewCount": "150",
        "bestRating": "5",
        "worstRating": "1"
      }
    }
    </script>

  <!-- Structured Data: WebSite with SearchAction -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "SiHuni",
      "url": "https://sihuni.app",
      "description": "Platform manajemen properti terlengkap di Indonesia",
      "inLanguage": "id-ID",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://sihuni.app/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

  <!-- Preconnect hints -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
